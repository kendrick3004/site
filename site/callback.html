<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Autenticando...</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #4facfe; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <script>
        (function() {
            try {
                let params = new URLSearchParams(window.location.hash.substring(1));
                let token = params.get('access_token');

                if (!token) {
                    params = new URLSearchParams(window.location.search);
                    token = params.get('access_token');
                }

                if (token) {
                    localStorage.setItem('google_drive_token', token);
                    localStorage.setItem('google_drive_token_time', Date.now().toString());
                    // Redireciona instantaneamente para a URL limpa (sem .html)
                    window.location.replace('/pages/calendar?auth=success');
                } else {
                    window.location.replace('/pages/calendar?auth=error');
                }
            } catch (e) {
                window.location.replace('/pages/calendar?auth=error');
            }
        })();
    </script>
</body>
</html>
