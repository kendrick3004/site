<!--
    ARQUIVO: 403.html
    DESCRIÇÃO: Página de erro de acesso negado (Forbidden).
    VERSÃO: 1.0.0
-->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Acesso Negado</title>
    <script src="/src/js/main/factory.js"></script>
    <script src="/src/js/main/config.js"></script>
    <link rel="stylesheet" href="/pages/suite/suite.css">
    <link rel="stylesheet" href="/pages/error-pages/error-pages.css">
    <style>
        .error-icon { font-size: 64px; margin-bottom: 20px; }
        .return-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid #fbbf24;
            color: #fbbf24 !important;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .return-link:hover { background: rgba(255, 215, 0, 0.2); transform: translateY(-2px); }
    </style>
</head>
<body class="dark-mode">
    <div class="container">
        <div class="error-container">
            <div class="error-icon">🚫</div>
            <h1 class="error-title">403</h1>
            <p class="error-message">Acesso Negado</p>
            <p class="error-description">Você não tem permissão para acessar este recurso.<br>Isso pode ocorrer devido a restrições de segurança ou falta de autenticação.</p>
            <a href="/" class="return-link">Voltar para a Página Inicial</a>
        </div>
    </div>
</body>
</html>
