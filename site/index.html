    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="database/assets/dev/favicon/icon-192.png">
    
    <!-- Script para redirecionar para splash no PWA (Executado IMEDIATAMENTE no head) -->
    <script>
        (function() {
            /**
             * Detecta se está rodando como PWA instalado (standalone)
             */
            function isStandalone() {
                // Verificação 1: display-mode: browser (navegador web comum) - NEGA PWA
                if (window.matchMedia && window.matchMedia('(display-mode: browser)').matches) {
                    return false;
                }

                // Verificação 2: display-mode: standalone (padrão W3C - Android Chrome) - CONFIRMA PWA
                if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) {
                    return true;
                }

                // Verificação 3: navigator.standalone (iOS Safari) - CONFIRMA PWA
                if (window.navigator.standalone === true) {
                    return true;
                }

                // Verificação 4: referrer de app Android - CONFIRMA PWA
                if (document.referrer && document.referrer.includes('android-app://')) {
                    return true;
                }

                return false;
            }

            // Verifica se é a primeira carga nesta sessão
            const hasVisited = sessionStorage.getItem('suite_visited');
            
            if (!hasVisited && isStandalone()) {
                console.log('[PWA] 🎨 PWA Detectado - Redirecionando para splash-pwa.html...');
                sessionStorage.setItem('suite_visited', 'true');
                // Usa replace para não deixar o index.html vazio no histórico
                window.location.replace('splash-pwa.html');
            } else {
                sessionStorage.setItem('suite_visited', 'true');
                console.log('[PWA] 🌐 Modo normal ou volta ao app - Mantendo index.html');
            }
        })();
    </script>
