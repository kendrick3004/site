<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Suite - Carregando...</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1a1a1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Estilos da Splash Screen v5.0 embutidos para carregamento instantâneo -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Lato:wght@300;400;700&display=swap');

        :root {
            --splash-bg: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            --gold: #edb939;
            --text: #f8f8f8;
            --loading: #888888;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Lato', sans-serif;
        }

        .splash-container {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            background: var(--splash-bg);
            transition: opacity 0.6s ease-out;
        }

        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            text-align: center;
            width: 100%;
            max-width: 320px;
            padding: 40px 20px;
            box-sizing: border-box;
            position: relative;
        }

        .splash-logo-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: logoWrapperFadeIn 0.8s ease-out 0.1s both;
        }

        .splash-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.25) 0%, transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
            filter: blur(8px);
        }

        .splash-rays {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: raysRotate 8s linear infinite;
        }

        .splash-ray {
            position: absolute;
            width: 2px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(212, 175, 55, 0.5), transparent);
            left: 50%;
            top: 0;
            transform-origin: 0 80px;
            margin-left: -1px;
        }

        .splash-logo {
            width: 250px;
            height: 250px;
            object-fit: contain;
            filter: drop-shadow(0 8px 24px rgba(212, 175, 55, 0.4));
            animation: logoFadeInScale 1s ease-out 0.3s both, logoFloat 4s ease-in-out infinite 1.3s;
            position: relative;
            z-index: 2;
            margin-top: 60px;
        }

        .splash-loader {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
            animation: drawLine 1.2s ease-out 1s both, loaderGlow 2s ease-in-out infinite 2.2s;
            margin-top: 50px;
            border-radius: 2px;
        }

        .splash-text {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text);
            margin: 0;
            animation: textFadeIn 1s ease-out 1.2s both;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .splash-loading {
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--loading);
            margin: 0;
            text-transform: uppercase;
            animation: textFadeIn 1s ease-out 1.4s both, loadingBlink 1.5s ease-in-out infinite 1.4s;
        }

        @keyframes logoWrapperFadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes logoFadeInScale { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
        @keyframes logoFloat { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
        @keyframes glowPulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
        @keyframes raysRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes drawLine { from { width: 0; opacity: 0; } to { width: 100px; opacity: 1; } }
        @keyframes loaderGlow { 0%, 100% { box-shadow: 0 0 12px rgba(212, 175, 55, 0.6); } 50% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.9); } }
        @keyframes textFadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes loadingBlink { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        .fade-out { opacity: 0 !important; }
    </style>
</head>
<body>

    <div id="custom-splash" class="splash-container">
        <div class="splash-content">
            <div class="splash-logo-wrapper">
                <div class="splash-glow"></div>
                <div class="splash-rays">
                    <div class="splash-ray" style="transform: rotate(0deg);"></div>
                    <div class="splash-ray" style="transform: rotate(30deg);"></div>
                    <div class="splash-ray" style="transform: rotate(60deg);"></div>
                    <div class="splash-ray" style="transform: rotate(90deg);"></div>
                    <div class="splash-ray" style="transform: rotate(120deg);"></div>
                    <div class="splash-ray" style="transform: rotate(150deg);"></div>
                    <div class="splash-ray" style="transform: rotate(180deg);"></div>
                    <div class="splash-ray" style="transform: rotate(210deg);"></div>
                    <div class="splash-ray" style="transform: rotate(240deg);"></div>
                    <div class="splash-ray" style="transform: rotate(270deg);"></div>
                    <div class="splash-ray" style="transform: rotate(300deg);"></div>
                    <div class="splash-ray" style="transform: rotate(330deg);"></div>
                </div>
                <img src="database/assets/dev/dev/favicon/Favicon_R.png" alt="Suite Logo" class="splash-logo">
            </div>
            <div class="splash-loader"></div>
            <h1 class="splash-text">Suite</h1>
            <p class="splash-loading">Carregando...</p>
        </div>
    </div>

    <script>
        // Redirecionamento instantâneo após a animação
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('custom-splash').classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = 'index';
                }, 600);
            }, 1800);
        };

        // Segurança
        setTimeout(() => { window.location.href = 'index.html'; }, 5000);
    </script>
</body>
</html>
