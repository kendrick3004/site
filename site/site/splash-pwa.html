<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Suite - Carregando...</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1a1a1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Importação das fontes premium -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Lato:wght@300;400;700&display=swap">
    
    <!-- Estilos da Splash Screen (Design Original Personalizado) -->
    <style>
        /* ═══════════════════════════════════════════════════════════════════════════════ */
        /* SPLASH SCREEN CSS - DESIGN ORIGINAL SAGRADO CONTEMPORÂNEO v5.1 */
        /* ═══════════════════════════════════════════════════════════════════════════════ */

        :root {
            --splash-bg-light: linear-gradient(135deg, #ffffff 0%, #f8f8f8 100%);
            --splash-bg-dark: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            --gold-light: #b8860b;
            --gold-dark: #d4af37;
            --text-light: #1a1a1a;
            --text-dark: #f8f8f8;
            --loading-light: #999999;
            --loading-dark: #888888;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* SPLASH CONTAINER */
        .splash-container {
            display: none; /* Escondido por padrão até detecção */
            visibility: visible;
            opacity: 1;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
            background: var(--splash-bg-dark);
            overflow: hidden;
        }

        .splash-container.active {
            display: flex;
        }

        .splash-container.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* CONTENT */
        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            text-align: center;
            width: 100%;
            max-width: 320px;
            padding: 40px 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        /* LOGO WRAPPER - Centro fixo para os raios */
        .splash-logo-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: logoWrapperFadeIn 0.8s ease-out 0.1s both;
        }

        .splash-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.25) 0%, transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
            filter: blur(8px);
        }

        .splash-rays {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: raysRotate 8s linear infinite;
        }

        .splash-ray {
            position: absolute;
            width: 2px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(212, 175, 55, 0.5), transparent);
            left: 50%;
            top: 0;
            transform-origin: 0 80px;
            margin-left: -1px;
        }

        /* LOGO - Ajustado para centralização perfeita */
        .splash-logo {
            width: 250px;
            height: 250px;
            object-fit: contain;
            filter: drop-shadow(0 8px 24px rgba(212, 175, 55, 0.4));
            animation: logoFadeInScale 1s ease-out 0.3s both, logoFloat 4s ease-in-out infinite 1.3s;
            position: relative;
            z-index: 2;
            display: block;
            margin: 0 auto;
            margin-top: 60px;
        }

        /* LOADER */
        .splash-loader {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4af37 30%, #d4af37 70%, transparent);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
            animation: drawLine 1.2s ease-out 1s both, loaderGlow 2s ease-in-out infinite 2.2s;
            display: block;
            margin: 8px 0;
            border-radius: 2px;
            margin-top: 50px;
        }

        /* TEXT */
        .splash-text {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            animation: textFadeIn 1s ease-out 1.2s both;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .splash-loading {
            font-family: 'Lato', sans-serif;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--loading-dark);
            margin: 0;
            padding: 0;
            text-transform: uppercase;
            animation: textFadeIn 1s ease-out 1.4s both, loadingBlink 1.5s ease-in-out infinite 1.4s;
        }

        /* ANIMAÇÕES */
        @keyframes logoWrapperFadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes logoFadeInScale { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
        @keyframes logoFloat { 0%, 100% { transform: translateY(0px); opacity: 1; } 50% { transform: translateY(-12px); opacity: 0.95; } }
        @keyframes glowPulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
        @keyframes raysRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes drawLine { from { width: 0; opacity: 0; } to { width: 100px; opacity: 1; } }
        @keyframes loaderGlow { 0%, 100% { box-shadow: 0 0 12px rgba(212, 175, 55, 0.6); } 50% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.9); } }
        @keyframes textFadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes loadingBlink { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        /* RESPONSIVO */
        @media (max-width: 480px) {
            .splash-content {
                max-width: 280px;
                padding: 30px 15px;
                gap: 20px;
            }

            .splash-logo-wrapper {
                width: 140px;
                height: 140px;
            }

            .splash-logo {
                width: 200px;
                height: 200px;
                margin-top: 50px;
            }

            .splash-text {
                font-size: 40px;
                letter-spacing: 2px;
            }

            .splash-loading {
                font-size: 11px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

    <!-- ESTRUTURA DA SPLASH SCREEN -->
    <div id="custom-splash" class="splash-container">
        <div class="splash-content">
            <!-- Logo com efeito de glow e raios -->
            <div class="splash-logo-wrapper">
                <div class="splash-glow"></div>
                <div class="splash-rays">
                    <!-- Raios criados dinamicamente via JS -->
                </div>
                <!-- Logo com fallback -->
                <img src="database/assets/dev/favicon/Favicon_R.png" alt="Suite Logo" class="splash-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1054/1054453.png'">
            </div>
            
            <!-- Linha divisória em ouro -->
            <div class="splash-loader"></div>
            
            <!-- Título da aplicação -->
            <h1 class="splash-text">Suite</h1>
            
            <!-- Texto de carregamento -->
            <p class="splash-loading">Carregando...</p>
        </div>
    </div>

    <script>
        /**
         * Detecta se está rodando como PWA instalado (standalone)
         */
        function isStandalone() {
            // Verificação 1: display-mode: browser (navegador web comum) - NEGA PWA
            if (window.matchMedia && window.matchMedia('(display-mode: browser)').matches) {
                return false;
            }

            // Verificação 2: display-mode: standalone (padrão W3C - Android Chrome) - CONFIRMA PWA
            if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) {
                return true;
            }

            // Verificação 3: navigator.standalone (iOS Safari) - CONFIRMA PWA
            if (window.navigator.standalone === true) {
                return true;
            }

            // Verificação 4: referrer de app Android - CONFIRMA PWA
            if (document.referrer && document.referrer.includes('android-app://')) {
                return true;
            }

            return false;
        }

        /**
         * Função para criar os 12 raios dinamicamente
         */
        function createRays() {
            const raysContainer = document.querySelector('.splash-rays');
            if (!raysContainer) return;
            
            raysContainer.innerHTML = '';
            
            for (let i = 0; i < 12; i++) {
                const ray = document.createElement('div');
                ray.className = 'splash-ray';
                ray.style.transform = `rotate(${i * 30}deg)`;
                raysContainer.appendChild(ray);
            }
            
            console.log('[Splash] ✨ Raios de luz criados (12 raios)');
        }

        /**
         * Função para redirecionar para o app após a animação
         */
        function redirectToApp() {
            const splash = document.getElementById('custom-splash');
            
            // Aguarda 1.5 segundos para a animação rodar
            setTimeout(() => {
                console.log('[Splash] 👋 Iniciando fade-out...');
                splash.classList.add('fade-out');
                
                // Aguarda o fade-out terminar (0.6s)
                setTimeout(() => {
                    console.log('[Splash] 🔄 Redirecionando para o app...');
                    window.location.href = 'index.html';
                }, 600);
            }, 1500);
            
            // Timeout de segurança: se demorar muito, redireciona em 7 segundos
            setTimeout(() => {
                if (splash.classList.contains('fade-out') === false) {
                    console.log('[Splash] ⏱️ Timeout atingido, redirecionando...');
                    splash.classList.add('fade-out');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 600);
                }
            }, 7000);
        }

        /**
         * Inicialização com detecção de PWA
         */
        function init() {
            const splash = document.getElementById('custom-splash');
            
            if (isStandalone()) {
                console.log('[Splash] ✅ PWA detectado. Mostrando splash...');
                splash.classList.add('active');
                createRays();
                redirectToApp();
            } else {
                console.log('[Splash] 🌐 Navegador web comum. Pulando splash...');
                window.location.replace('index.html');
            }
        }

        // Executa imediatamente
        init();
    </script>
</body>
</html>
